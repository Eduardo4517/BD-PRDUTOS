    function filtrar() {
        const termo = document.getElementById('busca').value.toLowerCase();
        const lista = document.getElementById('listaProdutos');
        lista.innerHTML = '';
        if (termo.length < 2) return;

        const filtrados = produtos.filter(p => 
            p.c.toLowerCase().includes(termo) || 
            p.n.toLowerCase().includes(termo)
        );

        if (filtrados.length === 0) {
            lista.innerHTML = '<div class="no-result">Nenhum item encontrado com este código ou nome.</div>';
            return;
        }

        filtrados.forEach(p => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<span class="codigo">${p.c}</span><span class="nome">${p.n}</span>`;
            lista.appendChild(div);
        });
    }
